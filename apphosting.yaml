    value: https://prospectplus.com.au
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: AIzaSyA92XGDo8rx11izPYT7z2L-YPMMJ6Ih1s0
  - variable: NEXT_PUBLIC_AIRCALL_API_TOKEN
    value: f91a42e6c7ae88088e58859f0a6e2596
  - variable: NEXT_PUBLIC_AIRCALL_API_ID
    value: fefb739312ef752526263326eb1a412e
  - variable: WEBHOOK_SECRET
    secret: WEBHOOK_SECRET
  - variable: AIRCALL_API_KEY
    secret: AIRCALL_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: HUNTER_API_KEY
    secret: HUNTER_API_KEY
  - variable: AIRCALL_API_TOKEN
    secret: AIRCALL_API_TOKEN
  - variable: AIRCALL_API_ID
    secret: AIRCALL_API_ID
